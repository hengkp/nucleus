# SISP CIFS Gateway — Samba config (ADR-004).
# Runs on the dedicated gateway node (node2 recommended; node1 acceptable for a small lab
# but it already carries LDAP + nginx + the control plane, so prefer node2). DNS name
# nas.sisp.com points at whichever node hosts this.
#
# What this fixes (Problem A): clients stop mounting the Infortrend NAS directly. They
# mount THIS gateway, which authenticates every user against OpenLDAP and runs smbd as the
# user's real LDAP uid/gid (resolved by SSSD). Every file a user writes is therefore owned
# by that user BY CONSTRUCTION — stale Windows sessions can no longer scramble ownership.

[global]
    workgroup = SISP
    server string = SISP NAS Gateway
    netbios name = NAS
    realm =
    server role = standalone server
    security = user

    # Authenticate against OpenLDAP via the Samba ldapsam passdb (Path A, ADR-001).
    # Requires the Samba schema loaded and each user given sambaSamAccount/sambaNTPassword.
    passdb backend = ldapsam:ldap://127.0.0.1
    ldap suffix = dc=siriraj,dc=local
    ldap user suffix = ou=People
    ldap group suffix = ou=Groups
    ldap admin dn = cn=samba-pwsync,dc=siriraj,dc=local
    ldap ssl = start tls
    ldap passwd sync = no

    # uid/gid come from SSSD/NSS (one true identity cluster-wide). Do NOT use idmap to
    # invent ids — we want the directory's posix numbers so they match SLURM jobs.
    idmap config * : backend = tdb
    idmap config * : range = 3000-7999

    # Correctness over browse-perf: leases/oplocks off so ownership/locking stays coherent
    # across the NFS backhaul and concurrent app access (ADR-004 / RISKS #31).
    oplocks = no
    level2 oplocks = no
    kernel oplocks = no
    smb2 leases = no

    # SMB hardening.
    server min protocol = SMB2_10
    client min protocol = SMB2_10
    server signing = mandatory
    smb encrypt = desired
    restrict anonymous = 2
    map to guest = Never

    # macOS Finder compatibility (vfs_fruit). VERIFIED 2026-06-27 by the S1 spike: the NAS
    # NFS export does NOT support user.* xattrs, so use the netatalk sidecar scheme and drop
    # streams_xattr/acl_xattr (RISKS #20 reduced-fidelity fallback). Windows is unaffected.
    vfs objects = catia fruit
    fruit:metadata = netatalk
    fruit:resource = file
    fruit:posix_rename = yes
    fruit:nfs_aces = no

    log file = /var/log/samba/%m.log
    max log size = 5000
    log level = 1 auth:3

# Per-user lockers. path uses %U so a connection only ever sees the connecting user's own
# locker, and `valid users = %U` means only that user may connect to their path.
# Files inherit the user's uid:gid (smbd runs as the user) with 0700/2700 isolation.
[sisplockers]
    comment = Your personal locker
    path = /srv/nas/sisplockers/%U
    valid users = %U
    browseable = no
    read only = no
    create mask = 0600
    directory mask = 0700
    force create mode = 0600
    force directory mode = 0700
    hide unreadable = yes

# Group collaboration space. Group-writable, setgid so new files keep the group; access by
# membership only. Lives under an explicit _shared tree, never the lockers root (ADR-004:
# never make the 55 lockers mutually readable).
[shared]
    comment = Shared lab space
    path = /srv/nas/shared
    valid users = @sisp
    read only = no
    create mask = 0660
    directory mask = 2770
    force group = sisp

# Department/project shares re-exported from the NAS. One stanza per share; restrict each
# to the owning posix group. Example (repeat for research/hr/CRCproject/… per the shares CSV):
[research]
    comment = Research share
    path = /srv/nas/research
    valid users = @research
    read only = no
    create mask = 0660
    directory mask = 2770
    force group = research
