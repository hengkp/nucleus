# SISP CIFS Gateway — SSSD (uid/gid resolution from OpenLDAP).
# Install at /etc/sssd/sssd.conf, mode 0600 root:root, then `systemctl restart sssd`.
# Identical on the gateway node and node1-4 EXCEPT ldap_uri (point at the local replica on
# the gateway, the primary 192.168.0.25 elsewhere). This is what makes `getent passwd
# <user>` return the one-true LDAP uid/gid everywhere, so SMB writes and SLURM jobs agree.

[sssd]
config_file_version = 2
services = nss, pam
domains = siriraj

[nss]
filter_users = root,nodeadmin
filter_groups = root

[pam]
offline_credentials_expiration = 0

[domain/siriraj]
id_provider = ldap
auth_provider = ldap
access_provider = ldap

# On the gateway, prefer a local syncrepl consumer so Samba/NSS don't depend on node1 for
# every lookup. Falls back to the primary.
ldap_uri = ldap://127.0.0.1:389,ldap://192.168.0.25:389
ldap_search_base = dc=siriraj,dc=local
ldap_user_search_base = ou=People,dc=siriraj,dc=local
ldap_group_search_base = ou=Groups,dc=siriraj,dc=local
ldap_schema = rfc2307
ldap_id_use_start_tls = true
ldap_tls_reqcert = demand
ldap_tls_cacert = /etc/sisp/ca/sisp-ca.pem

# Read-only service bind (least privilege).
ldap_default_bind_dn = cn=apphub-ro,dc=siriraj,dc=local
ldap_default_authtok_type = password
# ldap_default_authtok set via `sssctl` / a root-only drop-in, never committed.

# We pre-create homes out-of-band with correct uid/gid; do NOT let PAM mkhomedir run over
# the NFS double-hop (it would be root-squashed -> wrong owner). (ADR-004)
override_homedir = /srv/nas/sisplockers/%u
cache_credentials = false
enumerate = false
