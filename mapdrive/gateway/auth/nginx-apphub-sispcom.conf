# DEPLOYED vhost for apphub.sisp.com (node1: /etc/nginx/conf.d/43-apphub-sispcom.conf).
# Replace __APPHUB_PROXY_SECRET__ with the backend's APPHUB_PROXY_SECRET at install time.
# New SPA (/opt/sisp-apphub/web) + Authelia in-app auth + backend on :8793. Reuses the
# existing *.sisp.com TLS snippet. Other vhosts (zulip/leantime/jitsi) are untouched.

include /etc/nginx/apphub/routes.map;

server {
    listen 80;
    listen [::]:80;
    server_name apphub.sisp.com *.app.sisp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name apphub.sisp.com;

    include /etc/nginx/snippets/sisp-com-ssl.conf;

    root /opt/sisp-apphub/web;
    index index.html;

    location = /_apphub_authelia {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    location /authelia/ {
        proxy_pass http://127.0.0.1:9091/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /api/ {
        auth_request /_apphub_authelia;
        auth_request_set $ah_user $upstream_http_remote_user;
        auth_request_set $ah_groups $upstream_http_remote_groups;
        proxy_pass http://127.0.0.1:8793;
        proxy_set_header Host $host;
        proxy_set_header X-Remote-User $ah_user;
        proxy_set_header X-Remote-Groups $ah_groups;
        proxy_set_header X-Auth-Proxy "__APPHUB_PROXY_SECRET__";
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri /index.html;
    }
}
