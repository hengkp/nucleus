# Per-instance app routing: *.app.sisp.com -> the compute node:port running the app.
# Reconciler writes /etc/nginx/apphub/routes.upstreams (host -> ip:port). Authelia-gated;
# SSO cookie stripped before proxying to the app (ADR-005). Self-signed cert (stopgap).
map $host $app_upstream {
    default '';
    include /etc/nginx/apphub/routes.upstreams;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.app.sisp.com;

    ssl_certificate     /etc/ssl/certs/app-sisp.crt;
    ssl_certificate_key /etc/ssl/private/app-sisp.key;

    location = /_apphub_authelia {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }
    error_page 401 =302 https://apphub.sisp.com/;

    location / {
        auth_request /_apphub_authelia;
        if ($app_upstream = '') { return 404; }
        proxy_set_header Cookie "";            # do not leak the SSO cookie to app upstreams
        proxy_pass http://$app_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
