# nginx — AppHub public edge with Authelia auth_request (ADR-001/003/005).
# Place under /etc/nginx/conf.d/. Replace __APPHUB_PROXY_SECRET__ at deploy with the value
# of APPHUB_PROXY_SECRET in the backend env (the shared secret the backend verifies so a
# direct hit to the socket can't spoof identity).

# Per-instance upstreams: host -> nodeIP:port, written + reloaded by the AppHub reconciler.
map $host $app_upstream {
    default '';
    include /etc/nginx/apphub/routes.map;   # lines: "name-owner.app.sisp.com 192.168.0.26:31001;"
}

# Authelia verify endpoint, shared by all protected locations.
map $http_x_forwarded_proto $fwd_proto { default $scheme; "" $scheme; }

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name auth.sisp.com;
    # ssl_certificate / ssl_certificate_key — wildcard *.sisp.com (BUILD_PLAN P1).
    location / {
        proxy_pass http://127.0.0.1:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}

# ---- AppHub portal ----------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name apphub.sisp.com;
    # ssl_certificate ... ;

    # Authelia auth_request target (internal).
    location = /internal/authelia {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    # On 401 from auth_request, send the user to the Authelia portal.
    error_page 401 =302 https://auth.sisp.com/?rd=$scheme://$host$request_uri;

    # Static SPA (built dist). /api proxied to the backend, both behind auth.
    root /opt/sisp-apphub/web;
    index index.html;

    location /api/ {
        auth_request /internal/authelia;
        auth_request_set $user  $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name  $upstream_http_remote_name;

        # Inject trusted identity; OVERWRITE any client-supplied X-Remote-* (anti-spoof).
        proxy_set_header X-Remote-User   $user;
        proxy_set_header X-Remote-Groups $groups;
        proxy_set_header X-Remote-Name   $name;
        proxy_set_header X-Auth-Proxy    "__APPHUB_PROXY_SECRET__";

        proxy_pass http://unix:/run/apphub/apphub.sock;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    location / {
        auth_request /internal/authelia;
        try_files $uri /index.html;     # SPA fallback
    }
}

# ---- Per-instance app vhosts (*.app.sisp.com) -------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name *.app.sisp.com;          # wildcard cert SAN *.app.sisp.com
    # ssl_certificate ... ;

    location = /internal/authelia {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }
    error_page 401 =302 https://auth.sisp.com/?rd=$scheme://$host$request_uri;

    location / {
        auth_request /internal/authelia;
        # Per-instance authorization (owner/share/admin) is enforced by the AppHub backend;
        # add an auth_request to /api/authz/$host here once that endpoint ships (ADR-003).

        if ($app_upstream = '') { return 404; }   # unknown/expired instance

        # Do NOT forward the SSO cookie to user/app upstreams (ADR-005 cookie isolation).
        proxy_set_header Cookie "";
        proxy_set_header X-Apphub-Host $host;

        proxy_pass http://$app_upstream;
        proxy_set_header Host $host;

        # WebSocket support (Jupyter / RStudio / Shiny).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
