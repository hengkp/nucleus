include /etc/nginx/apphub/routes.map;

server {
    listen 80;
    listen [::]:80;
    server_name apphub.sisp.com *.app.sisp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name apphub.sisp.com;

    include /etc/nginx/snippets/sisp-com-ssl.conf;

    root /var/www/apphub.sisp.com;
    index index.html;

    location /api/ {
        auth_request /_apphub_auth;
        auth_request_set $apphub_user $upstream_http_x_authenticated_user;
        error_page 401 = @apphub_login;

        proxy_pass http://127.0.0.1:8792;
        include /etc/nginx/snippets/sisp-proxy-headers.conf;
        proxy_set_header X-Remote-User $apphub_user;
        proxy_set_header X-Remote-Groups "";
    }

    location / {
        auth_request /_apphub_auth;
        error_page 401 = @apphub_login;
        try_files $uri $uri/ /index.html;
    }

    location = /_apphub_auth {
        internal;
        proxy_pass http://127.0.0.1:8888/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Auth-Realm "SISP AppHub";
        proxy_set_header X-Cookie-Name nginxauth;
        proxy_set_header X-Cookie-Domain .sisp.com;
        proxy_set_header Cookie $http_cookie;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:8888/auth/;
        include /etc/nginx/snippets/sisp-proxy-headers.conf;
        proxy_set_header X-Auth-Realm "SISP AppHub";
        proxy_set_header X-Cookie-Name nginxauth;
        proxy_set_header X-Cookie-Domain .sisp.com;
        proxy_set_header Cookie $http_cookie;
    }

    location @apphub_login {
        return 302 /auth/login?service=$scheme://$http_host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name *.app.sisp.com;

    include /etc/nginx/snippets/sisp-com-ssl.conf;

    location / {
        if ($apphub_upstream = "") {
            return 404;
        }

        auth_request /_apphub_auth;
        error_page 401 = @apphub_login;

        proxy_pass $apphub_upstream;
        proxy_http_version 1.1;
        include /etc/nginx/snippets/sisp-proxy-headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering off;
    }

    location = /_apphub_auth {
        internal;
        proxy_pass http://127.0.0.1:8888/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Auth-Realm "SISP AppHub";
        proxy_set_header X-Cookie-Name nginxauth;
        proxy_set_header X-Cookie-Domain .sisp.com;
        proxy_set_header Cookie $http_cookie;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:8888/auth/;
        include /etc/nginx/snippets/sisp-proxy-headers.conf;
        proxy_set_header X-Auth-Realm "SISP AppHub";
        proxy_set_header X-Cookie-Name nginxauth;
        proxy_set_header X-Cookie-Domain .sisp.com;
        proxy_set_header Cookie $http_cookie;
    }

    location @apphub_login {
        return 302 https://apphub.sisp.com/auth/login?service=$scheme://$http_host$request_uri;
    }
}
