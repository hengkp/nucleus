# External access on :8443 — the router NATs *.sisp.freeddns.org:8443 -> node1:8443.
#   apphub.sisp.freeddns.org:8443   AppHub console, SSO (in-app login via /authelia/, like apphub.sisp.com)
#   <name>.sisp.freeddns.org:8443   hosted apps the OWNER marked public -> ANONYMOUS (no login)
# Public apps map is written by the reconciler (host -> nodeIP:port) for public+running instances only.
map $host $public_upstream {
    default '';
    include /etc/nginx/apphub/routes.public.upstreams;
}

# ---- AppHub console, external + SSO ----------------------------------------
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name apphub.sisp.freeddns.org;
    include /etc/nginx/snippets/sisp-ssl.conf;            # *.sisp.freeddns.org (dynu) wildcard cert

    root /opt/sisp-apphub/web;
    index index.html;

    location = /_apphub_authelia {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }
    location /authelia/ {
        proxy_pass http://127.0.0.1:9091/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
    location /api/ {
        auth_request /_apphub_authelia;
        auth_request_set $ah_user $upstream_http_remote_user;
        auth_request_set $ah_groups $upstream_http_remote_groups;
        proxy_pass http://127.0.0.1:8793;
        proxy_set_header Host $host;
        proxy_set_header X-Remote-User $ah_user;
        proxy_set_header X-Remote-Groups $ah_groups;
        proxy_set_header X-Auth-Proxy "05a28f16dfab7c83a4e27a133ee6814cf0a7493aaa3f54ae";
        proxy_http_version 1.1;
    }
    location / { try_files $uri /index.html; }
}

# ---- Public (opt-in) hosted apps, external + ANONYMOUS ----------------------
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name *.sisp.freeddns.org;                     # wildcard; specific names above win
    include /etc/nginx/snippets/sisp-ssl.conf;

    # Same friendly "starting" page for public apps during their launch window.
    error_page 502 503 504 = /_apphub_starting.html;
    location = /_apphub_starting.html {
        internal;
        root /var/www/apphub-starting;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location / {
        if ($public_upstream = '') { return 404; }       # not a public app -> 404
        proxy_pass http://$public_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
