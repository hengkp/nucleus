# Per-instance app routing: *.app.sisp.com -> the compute node:port running the app.
# Reconciler writes /etc/nginx/apphub/routes.upstreams (host -> ip:port). Authelia-gated;
# SSO cookie stripped before proxying to the app (ADR-005). Self-signed cert (stopgap).
map $host $app_upstream {
    default '';
    include /etc/nginx/apphub/routes.upstreams;
}

# Strip ONLY the Authelia SSO cookie from the Cookie header; keep the app's own session
# cookies (RStudio needs its session/csrf cookies; stripping ALL cookies caused a redirect loop).
map $http_cookie $app_cookie {
    default $http_cookie;
    "~*^(.*;\s?)?authelia_session=[^;]*(;\s?)?(.*)$" "$1$3";
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.app.sisp.com;

    ssl_certificate     /etc/ssl/certs/app-sisp.crt;
    ssl_certificate_key /etc/ssl/private/app-sisp.key;

    location = /_apphub_authelia {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$request_uri;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    # Owner-aware access: authenticate the Authelia session AND verify the caller owns this app
    # (or it is shared team/public). The backend returns 204 allow, 401 login, 403 deny, 404 unknown.
    # Authentication alone is not enough; otherwise any lab member could open someone else's app URL
    # and operate as that owner (the app runs as them).
    location = /_apphub_authz {
        internal;
        proxy_pass http://127.0.0.1:8793/api/authz;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Host $host;
        proxy_set_header Cookie $http_cookie;
    }
    error_page 401 =302 https://apphub.sisp.com/;

    # Branded "this app isn't yours" page when /api/authz denies a non-owner (keeps the 403).
    error_page 403 /_apphub_forbidden.html;
    location = /_apphub_forbidden.html {
        internal;
        root /var/www/apphub-forbidden;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    # Branded "app not found" page for an unknown/stopped/expired app host (keeps the 404).
    error_page 404 /_apphub_notfound.html;
    location = /_apphub_notfound.html {
        internal;
        root /var/www/apphub-notfound;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    # Friendly "your app is starting" page during the launch window (upstream not up yet),
    # instead of a raw 502. The interstitial auto-refreshes until the app answers.
    error_page 502 503 504 = /_apphub_starting.html;
    location = /_apphub_starting.html {
        internal;
        root /var/www/apphub-starting;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location / {
        # error_page must be set inside this location so the `if { return 404 }` below (an
        # implicit nested location) inherits it and serves the branded page, not nginx's default.
        error_page 404 /_apphub_notfound.html;
        auth_request /_apphub_authz;
        if ($app_upstream = '') { return 404; }
        proxy_set_header Cookie $app_cookie;            # do not leak the SSO cookie to app upstreams
        proxy_pass http://$app_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
